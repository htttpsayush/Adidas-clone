<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>adidas — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--font-display:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;}
  body{font-family:var(--font-body);background:#000;color:#fff;min-height:100vh;display:flex;flex-direction:column;}

  nav{
    position:fixed;top:0;left:0;width:100%;
    background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 2.5rem;height:72px;z-index:100;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .nav-logo img{height:45px;width:45px;object-fit:contain;display:block;}
  .nav-back{font-size:12px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:rgba(255,255,255,0.6);text-decoration:none;transition:color 0.2s;}
  .nav-back:hover{color:#fff;}

  .auth-wrap{
    flex:1;display:flex;align-items:center;justify-content:center;
    padding:6rem 1.5rem 3rem;
  }
  .auth-box{width:100%;max-width:440px;}

  .auth-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:2.5rem;}
  .auth-tab{
    flex:1;padding:1rem;text-align:center;
    font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
    color:rgba(255,255,255,0.4);cursor:pointer;border:none;background:none;
    border-bottom:2px solid transparent;margin-bottom:-1px;
    transition:color 0.2s,border-color 0.2s;
  }
  .auth-tab.active{color:#fff;border-bottom-color:#fff;}

  .auth-panel{display:none;}
  .auth-panel.active{display:block;}

  .auth-title{font-family:var(--font-display);font-size:clamp(40px,7vw,64px);font-weight:900;text-transform:uppercase;line-height:0.95;margin-bottom:0.5rem;}
  .auth-sub{font-size:14px;font-weight:300;color:rgba(255,255,255,0.5);margin-bottom:2rem;line-height:1.6;}

  .form-group{margin-bottom:1.2rem;}
  .form-label{display:block;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:0.5rem;}
  .form-input{
    width:100%;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    color:#fff;font-size:14px;font-family:var(--font-body);
    padding:14px 16px;outline:none;
    transition:border-color 0.2s,background 0.2s;
  }
  .form-input::placeholder{color:rgba(255,255,255,0.25);}
  .form-input:focus{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.09);}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

  .form-forgot{display:block;text-align:right;font-size:12px;color:rgba(255,255,255,0.4);text-decoration:none;margin-top:0.4rem;transition:color 0.2s;}
  .form-forgot:hover{color:#fff;}

  .btn-submit{width:100%;background:#fff;color:#000;border:none;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:16px;margin-top:1.5rem;transition:background 0.2s;font-family:var(--font-body);}
  .btn-submit:hover{background:#ddd;}

  .auth-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
  .auth-divider-line{flex:1;height:1px;background:rgba(255,255,255,0.1);}
  .auth-divider-text{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);}

  .social-btns{display:flex;flex-direction:column;gap:0.8rem;}
  .btn-social{
    width:100%;background:transparent;border:1px solid rgba(255,255,255,0.15);
    color:rgba(255,255,255,0.7);cursor:pointer;
    font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;
    padding:14px;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:border-color 0.2s,color 0.2s,background 0.2s;font-family:var(--font-body);
  }
  .btn-social:hover{border-color:rgba(255,255,255,0.4);color:#fff;background:rgba(255,255,255,0.05);}

  .auth-terms{font-size:11px;color:rgba(255,255,255,0.3);line-height:1.6;margin-top:1.5rem;text-align:center;}
  .auth-terms a{color:rgba(255,255,255,0.5);text-decoration:underline;}
  .auth-terms a:hover{color:#fff;}

  .auth-switch{text-align:center;margin-top:1.5rem;font-size:13px;color:rgba(255,255,255,0.4);}
  .auth-switch a{color:#fff;text-decoration:underline;cursor:pointer;}

  .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:14px 28px;opacity:0;transition:all 0.4s ease;z-index:999;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:500px){.form-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo"><img src="adidas-logo.png" alt="adidas"/></div>
  <a href="index.html" class="nav-back">← Back to Store</a>
</nav>

<div class="auth-wrap">
  <div class="auth-box">

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div class="auth-panel active" id="panel-login">
      <div class="auth-title">Welcome<br>Back.</div>
      <p class="auth-sub">Log in to your adidas account.</p>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="••••••••"/>
        <a href="#" class="form-forgot">Forgot password?</a>
      </div>

      <button class="btn-submit" onclick="showToast('Logged in successfully!')">Log In</button>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">or</span>
        <div class="auth-divider-line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social">G &nbsp; Continue with Google</button>
        <button class="btn-social">f &nbsp; Continue with Facebook</button>
      </div>

      <div class="auth-switch">Don't have an account? <a onclick="switchTab('signup')">Sign Up</a></div>
    </div>

    <!-- SIGNUP -->
    <div class="auth-panel" id="panel-signup">
      <div class="auth-title">Join<br>adidas.</div>
      <p class="auth-sub">Create your account and get exclusive access.</p>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" placeholder="John"/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" placeholder="Doe"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Min. 8 characters"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" placeholder="Repeat password"/>
      </div>

      <button class="btn-submit" onclick="showToast('Account created successfully!')">Create Account</button>

      <div class="auth-divider">
        <div class="auth-divider-line"></div>
        <span class="auth-divider-text">or</span>
        <div class="auth-divider-line"></div>
      </div>

      <div class="social-btns">
        <button class="btn-social">G &nbsp; Continue with Google</button>
        <button class="btn-social">f &nbsp; Continue with Facebook</button>
      </div>

      <div class="auth-terms">By creating an account you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
      <div class="auth-switch">Already have an account? <a onclick="switchTab('login')">Log In</a></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>{
    t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='signup'&&i===1));
  });
  document.getElementById('panel-login').classList.toggle('active',tab==='login');
  document.getElementById('panel-signup').classList.toggle('active',tab==='signup');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
